---
- name: Déploiement Kubernetes
  hosts: localhost
  connection: local
  become: yes
  vars:
    kubernetes_role: "{{ kubernetes_role }}"
    kubernetes_apiserver_advertise_address: "{{ kubernetes_apiserver_advertise_address }}"
    k8s_version: "{{ kubernetes_version | default('1.35.0') }}"
    join_command_file: /vagrant/join-command.sh
    pod_network_cidr: 10.244.0.0/16
    cri_socket: unix:///var/run/containerd/containerd.sock
  roles:
    - role: ulrich-sun.kubernetes
    